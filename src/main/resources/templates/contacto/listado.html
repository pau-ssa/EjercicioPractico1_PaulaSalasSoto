<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      <head th:replace="~{general/fragmentos :: head}"/>        
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>        

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <main class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-6">

                    <div class="card shadow border-0">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h4 class="mb-0"><i class="fa-solid fa-envelope me-2"></i>Contáctenos</h4>
                            <small class="text-muted">Envíenos sus consultas, quejas o sugerencias</small>
                        </div>

                        <form th:action="@{/}" method="GET" class="card-body p-4 needs-validation" novalidate="true">

                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-bold">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                    <input type="text" class="form-control" id="nombre" placeholder="Ej: Paula Salas" required="true"/>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="correo" class="form-label fw-bold">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-at"></i></span>
                                    <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com" required="true"/>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="mensaje" class="form-label fw-bold">Mensaje / Comentario</label>
                                <textarea class="form-control" id="mensaje" rows="4" placeholder="Escriba su mensaje aquí..." required="true"></textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/}" class="btn btn-outline-secondary me-md-2">
                                    <i class="fa-solid fa-arrow-left"></i> Regresar
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-floppy-disk"></i> Guardar
                                </button>
                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </main>
        
        <footer th:replace="~{general/fragmentos :: footer}"/>
        
        
        <script>
            (() => {
              'use strict';
              const forms = document.querySelectorAll('.needs-validation');
              Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                  if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                  }
                  form.classList.add('was-validated');
                }, false);
              });
            })();
        </script>
        
    </body>
</html>
